<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siperb API Documentation</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fafafa; }

    .topbar-wrapper { display: none !important; }

    .swagger-ui .info hgroup.main a { display: none; }

    .siperb-header {
      background: #1a1a2e;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .siperb-header svg { height: 32px; width: auto; }
    .siperb-header h1 {
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 18px;
      font-weight: 500;
    }
    .siperb-header a {
      color: rgba(255,255,255,0.6);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      text-decoration: none;
      margin-left: auto;
    }
    .siperb-header a:hover { color: #fff; }

    .swagger-ui .opblock.opblock-get .opblock-summary-method { background: #2e7d32; }
    .swagger-ui .opblock.opblock-get { border-color: #2e7d32; background: rgba(46,125,50,0.05); }
    .swagger-ui .opblock.opblock-post .opblock-summary-method { background: #1565c0; }
    .swagger-ui .opblock.opblock-post { border-color: #1565c0; background: rgba(21,101,192,0.05); }
    .swagger-ui .opblock.opblock-put .opblock-summary-method { background: #e65100; }
    .swagger-ui .opblock.opblock-put { border-color: #e65100; background: rgba(230,81,0,0.05); }
    .swagger-ui .opblock.opblock-delete .opblock-summary-method { background: #c62828; }
    .swagger-ui .opblock.opblock-delete { border-color: #c62828; background: rgba(198,40,40,0.05); }
  </style>
</head>
<body>
  <div class="siperb-header">
    <svg viewBox="0 0 120 32" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="24" fill="#4fc3f7" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="700">Siperb</text>
    </svg>
    <h1>API Documentation</h1>
    <a href="https://www.siperb.com">siperb.com</a>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    SwaggerUIBundle({
      url: "https://raw.githubusercontent.com/Siperb/siperb-mcp/main/openapi.json",
      dom_id: "#swagger-ui",
      deepLinking: true,
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIBundle.SwaggerUIStandalonePreset
      ],
      layout: "BaseLayout",
      defaultModelsExpandDepth: -1,
      docExpansion: "list",
      filter: true,
      tagsSorter: "alpha",
      operationsSorter: "method"
    });
  </script>
</body>
</html>
